# Voxtral vLLM Serving Configuration for SageMaker BYOC
# ============================================================
# Only options that model.py actually passes to vLLM CLI are marked [ACTIVE].
# Others are documented but unused — do NOT add them expecting vLLM to read this file.

# [ACTIVE] Model configuration
option.model_id=mistralai/Voxtral-Small-24B-2507
option.tensor_parallel_degree=4
option.dtype=bfloat16

# [ACTIVE] Voxtral-specific vLLM settings (required for mistral format models)
option.tokenizer_mode=mistral
option.config_format=mistral
option.load_format=mistral
option.trust_remote_code=true

# [ACTIVE] Memory and performance
option.gpu_memory_utilization=0.9
option.max_model_len=32768

# [ACTIVE] Multimodal audio settings (critical for Voxtral)
option.limit_mm_per_prompt=audio:8

# [ACTIVE] Performance flags
option.enable_chunked_prefill=true
# Prefix caching disabled — logs show 0% hit rate, adds overhead with no benefit
# Enable only if your workload has repeated system prompts across requests
option.enable_prefix_caching=true